services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-databases.sql:/docker-entrypoint-initdb.d/init-databases.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  keycloak:
    image: quay.io/keycloak/keycloak:26.0
    environment:
      KC_DB: postgres
      KC_DB_URL: jdbc:postgresql://postgres:5432/keycloak_db
      KC_DB_USERNAME: postgres
      KC_DB_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      KC_HOSTNAME_STRICT: "false"
      KC_HTTP_ENABLED: "true"
      KC_PROXY_HEADERS: xforwarded
      KEYCLOAK_ADMIN: admin
      KEYCLOAK_ADMIN_PASSWORD: ${KEYCLOAK_ADMIN_PASSWORD:-admin}
    command: start-dev --import-realm
    volumes:
      - ./Enterprise-Multitenant-Chatbot/Realms:/opt/keycloak/data/import
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy

  chatbot-api:
    build:
      context: ./src
      dockerfile: ChatBot.Api/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__chatbotdb: "Host=postgres;Port=5432;Database=chatbot_db;Username=postgres;Password=${POSTGRES_PASSWORD:-postgres}"
      OpenAI__ApiKey: ${OPENAI_API_KEY:-}
      Claude__ApiKey: ${CLAUDE_API_KEY:-}
    ports:
      - "5200:8080"
    depends_on:
      postgres:
        condition: service_healthy

  chatbot-gateway:
    build:
      context: ./src
      dockerfile: ChatBot.Gateway/Dockerfile
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      Keycloak__Url: http://keycloak:8080
      ReverseProxy__Clusters__chatbot-api__Destinations__primary__Address: http://chatbot-api:8080
    ports:
      - "5100:8080"
    depends_on:
      - chatbot-api
      - keycloak

  chatbot-frontend:
    build:
      context: ./src/ChatBot.Frontend
      dockerfile: Dockerfile
    ports:
      - "3000:80"
    depends_on:
      - chatbot-gateway

volumes:
  postgres_data:
